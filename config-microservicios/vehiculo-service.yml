server:
  port: 0

spring:
  application:
    name: vehiculo-service

  datasource:
    url: jdbc:mysql://mysql_database:3306/bd_vehiculos
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/